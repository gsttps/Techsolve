<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080c18"/>
      <stop offset="100%" stop-color="#0d1326"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="8" y1="12" x2="56" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="32" y1="0" x2="32" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="url(#brandGrad)" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- Inner glow -->
  <rect x="4" y="4" width="56" height="56" rx="10" fill="url(#glowGrad)"/>

  <!-- Circuit decoration lines -->
  <g stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1" stroke-linecap="round">
    <!-- Top-left circuit -->
    <line x1="8" y1="10" x2="16" y2="10"/>
    <line x1="16" y1="10" x2="16" y2="6"/>
    <circle cx="16" cy="6" r="1.5" fill="#3b82f6" fill-opacity="0.3" stroke="none"/>
    <!-- Bottom-right circuit -->
    <line x1="56" y1="54" x2="48" y2="54"/>
    <line x1="48" y1="54" x2="48" y2="58"/>
    <circle cx="48" cy="58" r="1.5" fill="#22d3ee" fill-opacity="0.3" stroke="none"/>
    <!-- Top-right node -->
    <circle cx="52" cy="10" r="1.5" fill="#22d3ee" fill-opacity="0.25" stroke="none"/>
    <line x1="52" y1="10" x2="56" y2="10"/>
    <!-- Bottom-left node -->
    <circle cx="12" cy="54" r="1.5" fill="#3b82f6" fill-opacity="0.25" stroke="none"/>
    <line x1="8" y1="54" x2="12" y2="54"/>
  </g>

  <!-- "TS" text with gradient and glow -->
  <g filter="url(#glow)">
    <text x="32" y="44" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="30" fill="url(#brandGrad)" letter-spacing="-1">TS</text>
  </g>

  <!-- Subtle bottom accent line -->
  <line x1="18" y1="50" x2="46" y2="50" stroke="url(#brandGrad)" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5"/>
</svg>